name: openclaw-azure
metadata:
  template: openclaw-azure@0.0.1
  description: OpenClaw AI assistant on Azure Container Apps with Azure OpenAI (v1 API)

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./infra/hooks/preprovision.ps1
    posix:
      shell: sh
      run: ./infra/hooks/preprovision.sh
    continueOnError: false
  postprovision:
    windows:
      shell: pwsh
      run: ./infra/hooks/postprovision.ps1
    posix:
      shell: sh
      run: ./infra/hooks/postprovision.sh
    continueOnError: true
  postdeploy:
    windows:
      shell: pwsh
      run: ./infra/hooks/postdeploy.ps1
    posix:
      shell: sh
      run: ./infra/hooks/postdeploy.sh
    continueOnError: true

services:
  openclaw:
    host: containerapp
    language: js
    project: ./src
    docker:
      path: Dockerfile
      remoteBuild: true
